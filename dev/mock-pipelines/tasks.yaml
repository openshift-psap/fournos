# Mock Tekton Tasks — replace the real Tasks with lightweight stubs
# that echo parameters and sleep briefly instead of running FORGE.

apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-prepare
spec:
  params:
    - name: kubeconfig-secret
      type: string
    - name: job-name
      type: string
  steps:
    - name: validate
      image: busybox:1.36
      script: |
        #!/bin/sh
        echo "[mock-prepare] job=$(params.job-name)"
        echo "[mock-prepare] kubeconfig-secret=$(params.kubeconfig-secret)"
        echo "[mock-prepare] connectivity check: OK"

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-run
spec:
  params:
    - name: forge-project
      type: string
    - name: forge-args
      type: array
    - name: forge-config-overrides
      type: string
    - name: env
      type: string
    - name: kubeconfig-secret
      type: string
    - name: gpu-count
      type: string
    - name: job-name
      type: string
    - name: secret-refs
      type: array
  steps:
    - name: run-forge
      image: busybox:1.36
      args: ["$(params.forge-args[*])"]
      script: |
        #!/bin/sh
        echo "[mock-run] forge run $(params.forge-project) $@"
        echo "[mock-run] config-overrides=$(params.forge-config-overrides)"
        echo "[mock-run] env=$(params.env)"
        echo "[mock-run] gpu-count=$(params.gpu-count)"
        echo "[mock-run] job=$(params.job-name)"
        echo "[mock-run] simulating workload (3s)..."
        sleep 3
        echo "[mock-run] done"

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-cleanup
spec:
  params:
    - name: kubeconfig-secret
      type: string
    - name: job-name
      type: string
  steps:
    - name: cleanup
      image: busybox:1.36
      script: |
        #!/bin/sh
        echo "[mock-cleanup] job=$(params.job-name)"
        echo "[mock-cleanup] nothing to clean up in mock mode"

---
# Mock run-only Pipeline.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: fournos-run-only
spec:
  params:
    - name: job-name
      type: string
    - name: forge-project
      type: string
    - name: forge-args
      type: array
    - name: forge-config-overrides
      type: string
      default: ""
    - name: env
      type: string
      default: ""
    - name: kubeconfig-secret
      type: string
    - name: gpu-count
      type: string
    - name: secret-refs
      type: array
      default: []
  tasks:
    - name: run
      taskRef:
        name: fournos-run
      params:
        - name: forge-project
          value: "$(params.forge-project)"
        - name: forge-args
          value: "$(params.forge-args[*])"
        - name: forge-config-overrides
          value: "$(params.forge-config-overrides)"
        - name: env
          value: "$(params.env)"
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"
        - name: gpu-count
          value: "$(params.gpu-count)"
        - name: job-name
          value: "$(params.job-name)"
        - name: secret-refs
          value: "$(params.secret-refs[*])"

---
# Mock kubeconfig Secrets — one per cluster defined in kueue-config.
# Content is a placeholder; Fournos only checks existence and passes
# the Secret name to the PipelineRun (the mock Tasks ignore it).

apiVersion: v1
kind: Secret
metadata:
  name: cluster-1-kubeconfig
type: Opaque
stringData:
  kubeconfig: "mock"


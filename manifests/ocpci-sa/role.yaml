apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ocpci-fournos-job-manager
  namespace: psap-automation
rules:
  - apiGroups: ["fournos.dev"]
    resources: ["fournosjobs"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

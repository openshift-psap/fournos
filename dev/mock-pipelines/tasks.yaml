# Mock Tekton Tasks — replace the real Tasks with lightweight stubs
# that echo parameters and sleep briefly instead of running FORGE.

apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-prepare
spec:
  params:
    - name: kubeconfig-secret
      type: string
    - name: job-name
      type: string
  steps:
    - name: validate
      image: busybox:1.36
      script: |
        #!/bin/sh
        echo "[mock-prepare] job=$(params.job-name)"
        echo "[mock-prepare] kubeconfig-secret=$(params.kubeconfig-secret)"
        echo "[mock-prepare] connectivity check: OK"

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-run
spec:
  params:
    - name: forge-project
      type: string
    - name: forge-config
      type: string
    - name: env
      type: string
    - name: kubeconfig-secret
      type: string
    - name: gpu-count
      type: string
    - name: job-name
      type: string
    - name: secret-refs
      type: array
  steps:
    - name: run-forge
      image: busybox:1.36
      env:
        - name: MOCK_SLEEP
          valueFrom:
            configMapKeyRef:
              name: fournos-mock-config
              key: sleep
              optional: true
      volumeMounts:
        - name: vault-secrets
          mountPath: /var/run/secrets/fournos
          readOnly: true
      script: |
        #!/bin/sh
        MOCK_SLEEP="${MOCK_SLEEP:-3}"
        echo "[mock-run] forge-project=$(params.forge-project)"
        echo "[mock-run] forge-config:"
        echo "$(params.forge-config)" | sed 's/^/  /'
        echo "[mock-run] env:"
        echo "$(params.env)" | sed 's/^/  /'
        echo "[mock-run] gpu-count=$(params.gpu-count)"
        echo "[mock-run] job=$(params.job-name)"
        echo "[mock-run] vault-secrets:"
        find /var/run/secrets/fournos -type f 2>/dev/null | sort | while read f; do echo "  $f = $(cat "$f")"; done
        echo "[mock-run] simulating workload (${MOCK_SLEEP}s)..."
        sleep "$MOCK_SLEEP"
        echo "[mock-run] done"

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-cleanup
spec:
  params:
    - name: kubeconfig-secret
      type: string
    - name: job-name
      type: string
  steps:
    - name: cleanup
      image: busybox:1.36
      script: |
        #!/bin/sh
        echo "[mock-cleanup] job=$(params.job-name)"
        echo "[mock-cleanup] nothing to clean up in mock mode"

---
# Mock run-only Pipeline.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: fournos-run-only
spec:
  params:
    - name: job-name
      type: string
    - name: forge-project
      type: string
    - name: forge-config
      type: string
    - name: env
      type: string
      default: ""
    - name: kubeconfig-secret
      type: string
    - name: gpu-count
      type: string
    - name: secret-refs
      type: array
      default: []
  tasks:
    - name: run
      taskRef:
        name: fournos-run
      params:
        - name: forge-project
          value: "$(params.forge-project)"
        - name: forge-config
          value: "$(params.forge-config)"
        - name: env
          value: "$(params.env)"
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"
        - name: gpu-count
          value: "$(params.gpu-count)"
        - name: job-name
          value: "$(params.job-name)"
        - name: secret-refs
          value: ["$(params.secret-refs[*])"]

---
# Mock config — controls mock task behavior.
# Override "sleep" to keep pipelines alive longer for exclusive-locking tests.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fournos-mock-config
data:
  sleep: "3"


# Single-step pipeline: validate only (used for smoke testing the connectivity to the target clusters).
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: fournos-validate-only
spec:
  params:
    - name: job-name
      type: string
    - name: forge-project
      type: string
    - name: forge-config
      type: string
      default: ""
    - name: env
      type: string
      default: ""
    - name: kubeconfig-secret
      type: string
    - name: gpu-count
      type: string
    - name: secret-refs
      type: array
      default: []
  tasks:
    - name: validate
      taskRef:
        name: fournos-validate
      params:
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"
        - name: job-name
          value: "$(params.job-name)"
        - name: secret-refs
          value:
            - $(params.secret-refs[*])

# Single-step pipeline: run only (no prepare, no cleanup).
# Use on pre-configured clusters where setup/teardown is handled externally.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: forge-test-only
spec:
  params:
    - name: fjob-name
      type: string
    - name: fournos-namespace
      type: string
    - name: kubeconfig-secret
      type: string
  tasks:
    - name: test
      taskRef:
        name: forge-step
      params:
        - name: fjob-name
          value: "$(params.fjob-name)"
        - name: fournos-namespace
          value: "$(params.fournos-namespace)"
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"
        - name: job-step
          value: "test"

# RBAC for reading secrets from the dedicated secrets namespace.
# Apply with: NAMESPACE=<operator-ns> SECRETS_NAMESPACE=<secrets-ns> envsubst | kubectl apply -f-

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fournos-secrets-reader
  namespace: ${SECRETS_NAMESPACE}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fournos-secrets-reader
  namespace: ${SECRETS_NAMESPACE}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fournos-secrets-reader
subjects:
  - kind: ServiceAccount
    name: fournos
    namespace: ${NAMESPACE}

# Template for the resolve K8s Job (currently Forge).
#
# The operator loads this at startup, deep-copies it per job, and injects
# dynamic values (metadata, image, env-var values, ownerReferences, deadline).
#
# The container setup mirrors config/forge/workflows/tasks.yaml (forge-step)
# so the same forge-core image runs through the identical bootstrap sequence.
# The only difference is that no kubeconfig volume is mounted — the resolve
# step runs on the hub cluster and does not need remote-cluster access.
apiVersion: batch/v1
kind: Job
spec:
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: fournos
      restartPolicy: Never
      containers:
        - name: resolve
          imagePullPolicy: Always
          env:
            - name: FJOB_NAME
            - name: FOURNOS_WORKLOAD_NAMESPACE
            - name: FOURNOS_STEP
              value: resolve-fournos-config
            - name: FOURNOS_CI
              value: "true"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -o pipefail
              set -o errexit
              set -o nounset
              set -o errtrace

              export ARTIFACT_DIR=/tmp/artifacts
              mkdir -p "${ARTIFACT_DIR}"

              exec &> >(tee -a "$ARTIFACT_DIR/run.log")

              oc get "fjob/$FJOB_NAME" -n "$FOURNOS_WORKLOAD_NAMESPACE" -oyaml > $ARTIFACT_DIR/fournos_fjob.yaml

              PULL_BASE_SHA=$(cat "$ARTIFACT_DIR/fournos_fjob.yaml" | yq -r .spec.env.PULL_BASE_SHA)
              if [[ "$PULL_BASE_SHA" != null ]]; then
                export PULL_BASE_SHA
              else
                unset PULL_BASE_SHA
              fi

              PULL_PULL_SHA=$(cat "$ARTIFACT_DIR/fournos_fjob.yaml" | yq -r .spec.env.PULL_PULL_SHA)
              if [[ "$PULL_PULL_SHA" != null ]]; then
                export PULL_PULL_SHA
              else
                unset PULL_PULL_SHA
              fi

              if [[ "${PULL_PULL_SHA:-}" ]]; then
                echo
                echo "Updating to PULL_PULL_SHA=$PULL_PULL_SHA ..."

                git -C "$FORGE_HOME" fetch --quiet origin "$PULL_PULL_SHA"
                git -C "$FORGE_HOME" reset --hard FETCH_HEAD
              else
                echo "No PULL_PULL_SHA, using the image commit"
              fi
              git show --quiet

              FORGE_PROJECT=$(cat "$ARTIFACT_DIR/fournos_fjob.yaml" | yq -r .spec.executionEngine.forge.project)
              if [[ -z "$FORGE_PROJECT" || "$FORGE_PROJECT" == null ]]; then
                echo "ERROR: invalid .spec.executionEngine.forge.project='$FORGE_PROJECT' in $FOURNOS_WORKLOAD_NAMESPACE/$FJOB_NAME"
                exit 1
              fi

              export FOURNOS_CI=true

              exec bin/run_ci "$FORGE_PROJECT" ci "$FOURNOS_STEP"

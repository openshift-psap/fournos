apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: forge-step
spec:
  params:
    - name: forge-project
      type: string
    - name: forge-config
      type: string
    - name: env
      type: string
    - name: kubeconfig-secret
      type: string
    - name: gpu-count
      type: string
    - name: job-name
      type: string
    - name: job-step
      type: string
    - name: secret-refs
      type: array
  steps:
    - name: forge
      image: image-registry.openshift-image-registry.svc:5000/psap-automation/forge-core:main
      env:
      - name: KUBECONFIG
        value: /workspace/kubeconfig/kubeconfig
      - name: FORGE_CONFIG
        value: "$(params.forge-config)"
      - name: FOURNOS_ENV
        value: "$(params.env)"
      - name: FOURNOS_STEP
        value: "$(params.job-step)"
      volumeMounts:
        - name: kubeconfig
          mountPath: /workspace/kubeconfig
          readOnly: true
      script: |
        #!/usr/bin/env bash

        set -o pipefail
        set -o errexit
        set -o nounset
        set -o errtrace

        export ARTIFACT_DIR=/tmp/artifacts
        mkdir -p "${ARTIFACT_DIR}"

        cat > $ARTIFACT_DIR/forge_config.yaml <<< "$FORGE_CONFIG"

        cat > $ARTIFACT_DIR/forge_config.env <<< "$FOURNOS_ENV"

        if grep -q '^PULL_BASE_SHA=' $ARTIFACT_DIR/forge_config.env; then
          export PULL_BASE_SHA=$(cat $ARTIFACT_DIR/forge_config.env | grep '^PULL_BASE_SHA=' | cut -d'=' -f2)
        fi

        if grep -q '^PULL_PULL_SHA=' $ARTIFACT_DIR/forge_config.env; then
          export PULL_PULL_SHA=$(cat $ARTIFACT_DIR/forge_config.env | grep '^PULL_PULL_SHA=' | cut -d'=' -f2)
        fi

        if [[ "${PULL_PULL_SHA:-}" ]]; then
        echo
          echo "Updating to PULL_PULL_SHA=$PULL_PULL_SHA ..."

          git -C "$FORGE_HOME" fetch --quiet origin "$PULL_PULL_SHA"
          git -C "$FORGE_HOME" reset --hard FETCH_HEAD
        else
          echo "No PULL_PULL_SHA, using the image commit"
        fi

        git show --quiet

        export FOURNOS_CI=true

        exec bin/run_ci "$(params.forge-project)" ci "$FOURNOS_STEP"

  volumes:
    - name: kubeconfig
      secret:
        secretName: $(params.kubeconfig-secret)

apiVersion: v1
kind: ServiceAccount
metadata:
  name: fournos
  namespace: psap-automation

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fournos
rules:
  # Kueue Workloads — full lifecycle
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["workloads"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Kueue read-only (queue / flavor / priority info)
  - apiGroups: ["kueue.x-k8s.io"]
    resources:
      - clusterqueues
      - localqueues
      - resourceflavors
      - workloadpriorityclasses
    verbs: ["get", "list", "watch"]
  # Tekton PipelineRuns — full lifecycle
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Tekton read-only (pipeline / task definitions)
  - apiGroups: ["tekton.dev"]
    resources: ["pipelines", "tasks"]
    verbs: ["get", "list"]
  # Secrets — read kubeconfig Secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fournos
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fournos
subjects:
  - kind: ServiceAccount
    name: fournos
    namespace: psap-automation

apiVersion: v1
kind: ServiceAccount
metadata:
  name: fournos
  namespace: psap-automation

---
# Namespace-scoped permissions for resources Fournos manages directly
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fournos
  namespace: psap-automation
rules:
  - apiGroups: ["fournos.dev"]
    resources: ["fournosjobs", "fournosjobs/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["workloads"]
    verbs: ["create", "get", "list", "watch", "patch", "delete"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fournos
  namespace: psap-automation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fournos
subjects:
  - kind: ServiceAccount
    name: fournos
    namespace: psap-automation

---
# Cluster-scoped access to Kueue configuration resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fournos-cluster
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kueue.x-k8s.io"]
    resources:
      - clusterqueues
      - resourceflavors
    verbs: ["create", "get", "list", "watch", "patch", "delete"]
  - apiGroups: ["kueue.x-k8s.io"]
    resources:
      - workloadpriorityclasses
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fournos-cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fournos-cluster
subjects:
  - kind: ServiceAccount
    name: fournos
    namespace: psap-automation

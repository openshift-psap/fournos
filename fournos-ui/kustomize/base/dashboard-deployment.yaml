apiVersion: apps/v1
kind: Deployment
metadata:
  name: fournos-dashboard
  namespace: fournos-dashboard
  labels:
    app.kubernetes.io/name: fournos-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fournos-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fournos-dashboard
    spec:
      serviceAccountName: fournos-dashboard
      securityContext:
        runAsNonRoot: true
      initContainers:
        - name: wait-for-postgresql
          image: postgres:15-alpine
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h $PGHOST -p $PGPORT -U $PGUSER; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
          envFrom:
            - secretRef:
                name: postgresql-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: dashboard
          image: YOUR_REGISTRY/fournos-dashboard:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: PGHOST
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: PGPORT
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: PGPASSWORD
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: PGDATABASE
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/$(PGDATABASE)"
            - name: FOURNOS_NAMESPACE
              value: SET_VIA_OVERLAY
            - name: PROJECTS_CONFIG_PATH
              value: /etc/fournos-dashboard/projects.yaml
            - name: LOG_LEVEL
              value: INFO
          volumeMounts:
            - name: projects-config
              mountPath: /etc/fournos-dashboard
              readOnly: true
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            timeoutSeconds: 5
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: projects-config
          configMap:
            name: fournos-projects

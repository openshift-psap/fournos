apiVersion: apps/v1
kind: Deployment
metadata:
  name: fournos
  namespace: psap-automation
  labels:
    app: fournos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fournos
  template:
    metadata:
      labels:
        app: fournos
    spec:
      serviceAccountName: fournos
      containers:
        - name: fournos
          image: quay.io/rh_perfscale/fournos:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: FOURNOS_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: fournos
  namespace: psap-automation
  labels:
    app: fournos
spec:
  selector:
    app: fournos
  ports:
    - port: 8000
      targetPort: http
      name: http

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: fournos
  namespace: psap-automation
spec:
  to:
    kind: Service
    name: fournos
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

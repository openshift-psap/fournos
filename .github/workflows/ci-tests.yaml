name: CI tests
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    uses: ./.github/workflows/ruff.yaml

  build:
    uses: ./.github/workflows/builders.yaml

  integration:
    needs: [lint, build]
    uses: ./.github/workflows/integration-tests.yaml

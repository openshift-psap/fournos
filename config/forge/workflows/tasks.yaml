apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: forge-step
spec:
  params:
    - name: forge-project
      type: string
    - name: forge-config
      type: string
    - name: env
      type: string
    - name: kubeconfig-secret
      type: string
    - name: gpu-count
      type: string
    - name: job-name
      type: string
    - name: job-step
      type: string
    - name: secret-refs
      type: array
  steps:
    - name: forge
      image: image-registry.openshift-image-registry.svc:5000/psap-automation/forge-core:main
      env:
      - name: KUBECONFIG
        value: /workspace/kubeconfig/kubeconfig
      - name: FORGE_CONFIG
        value: "$(params.forge-config)"
      - name: FOURNOS_ENV
        value: "$(params.env)"
      - name: FOURNOS_STEP
        value: "$(params.job-step)"
      volumeMounts:
        - name: kubeconfig
          mountPath: /workspace/kubeconfig
          readOnly: true
      script: |
        #!/usr/bin/env bash

        set -euo pipefail
        set -x

        cat > forge_config.yaml <<< "$FORGE_CONFIG"
        echo "--- forge_config.yaml:"
        cat forge_config.yaml
        echo "---"

        cat > forge_config.env <<< "$FOURNOS_ENV"
        echo "--- forge_config.env:"
        cat forge_config.env
        echo "---"

        set -a; source forge_config.env; set +a;
        
        if [[ "${PULL_PULL_SHA:-}" ]]; then
          git -C "$FORGE_HOME" fetch --quiet origin "$PULL_PULL_SHA"
          git -C "$FORGE_HOME" reset --hard FETCH_HEAD
        else
          echo "No PULL_PULL_SHA, using the image commit"
          git show --quiet
        fi

        export ARTIFACT_DIR=/tmp/artifacts
        mkdir -p "${ARTIFACT_DIR}"
        
        export FOURNOS_CI=true

        exec bin/run_ci "$(params.forge-project)" ci "$FOURNOS_STEP"

  volumes:
    - name: kubeconfig
      secret:
        secretName: $(params.kubeconfig-secret)

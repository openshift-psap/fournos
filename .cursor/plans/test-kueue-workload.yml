# Test Workloads -- three requests targeting different GPU types.
#
# GPU types are encoded as resource names (nvidia.com/gpu-a100, etc.)
# instead of nodeSelector labels. Kueue matches workloads to flavors
# purely by quota availability.
#
#   test-a100-2gpu  --> cluster-1 or cluster-2 (have A100 quota)
#   test-h200-2gpu  --> cluster-3 or cluster-4 (have H200 quota)
#   test-mixed-gpu  --> needs both A100 + H200, co-located on one cluster
#
# No pods are created. Kueue just does quota accounting.
#
# Prerequisites: apply kueue-config.yml first
#
# Apply:
#   kubectl apply -f test-kueue-workload.yml
#
# Check flavor assignments:
#   kubectl get workload -n psap-automation \
#     -o custom-columns='NAME:.metadata.name,FLAVOR:.status.admission.podSetAssignments[0].flavors'
#
# Check quota usage:
#   kubectl get clusterqueue fournos-queue \
#     -o jsonpath='{.status.flavorsUsage}' | jq .
#
# Clean up:
#   kubectl delete workload test-a100-2gpu test-h200-2gpu test-mixed-gpu -n psap-automation

apiVersion: kueue.x-k8s.io/v1beta2
kind: Workload
metadata:
  name: test-a100-2gpu
  namespace: psap-automation
  labels:
    kueue.x-k8s.io/queue-name: fournos-queue
spec:
  queueName: fournos-queue
  podSets:
    - name: launcher
      count: 1
      template:
        spec:
          containers:
            - name: placeholder
              image: "registry.k8s.io/pause:3.9"
              resources:
                requests:
                  nvidia.com/gpu-a100: "2"
                  cpu: "8"
          restartPolicy: Never

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: Workload
metadata:
  name: test-h200-2gpu
  namespace: psap-automation
  labels:
    kueue.x-k8s.io/queue-name: fournos-queue
spec:
  queueName: fournos-queue
  podSets:
    - name: launcher
      count: 1
      template:
        spec:
          containers:
            - name: placeholder
              image: "registry.k8s.io/pause:3.9"
              resources:
                requests:
                  nvidia.com/gpu-h200: "2"
                  cpu: "1"
          restartPolicy: Never

---
# Mixed-GPU workload: requests both A100 and H200 in a single podSet.
# Kueue will only admit this to a flavor (cluster) that has quota for both.
# With the current config (clusters have only one GPU type each), this
# workload will stay pending -- demonstrating the co-location constraint.
apiVersion: kueue.x-k8s.io/v1beta2
kind: Workload
metadata:
  name: test-mixed-gpu
  namespace: psap-automation
  labels:
    kueue.x-k8s.io/queue-name: fournos-queue
spec:
  queueName: fournos-queue
  podSets:
    - name: launcher
      count: 1
      template:
        spec:
          containers:
            - name: a100-work
              image: "registry.k8s.io/pause:3.9"
              resources:
                requests:
                  nvidia.com/gpu-a100: "1"
                  cpu: "4"
            - name: h200-work
              image: "registry.k8s.io/pause:3.9"
              resources:
                requests:
                  nvidia.com/gpu-h200: "1"
                  cpu: "4"
          restartPolicy: Never

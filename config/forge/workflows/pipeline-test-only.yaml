# Single-step pipeline: run only (no prepare, no cleanup).
# Use on pre-configured clusters where setup/teardown is handled externally.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: forge-test-only
spec:
  params:
    - name: job-name
      type: string
    - name: forge-project
      type: string
    - name: forge-preset
      type: string
    - name: forge-config-overrides
      type: string
      default: "{}"
    - name: env
      type: string
      default: "{}"
    - name: kubeconfig-secret
      type: string
    - name: gpu-count
      type: string
    - name: secrets
      type: array
      default: []
  tasks:
    - name: test
      taskRef:
        name: forge-step
      params:
        - name: forge-project
          value: "$(params.forge-project)"
        - name: forge-preset
          value: "$(params.forge-preset)"
        - name: forge-config-overrides
          value: "$(params.forge-config-overrides)"
        - name: env
          value: "$(params.env)"
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"
        - name: gpu-count
          value: "$(params.gpu-count)"
        - name: job-name
          value: "$(params.job-name)"
        - name: secrets
          value:
          - $(params.secrets[*])

        - name: job-step
          value: "test"

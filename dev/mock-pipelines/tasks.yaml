# Mock Tekton Tasks — replace the real Tasks with lightweight stubs
# that echo parameters and sleep briefly instead of running FORGE.

apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-prepare
spec:
  params:
    - name: kubeconfig-secret
      type: string
  steps:
    - name: validate
      image: busybox:1.36
      script: |
        #!/bin/sh
        echo "[mock-prepare] kubeconfig-secret=$(params.kubeconfig-secret)"
        echo "[mock-prepare] connectivity check: OK"

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-run
spec:
  params:
    - name: fjob-name
      type: string
    - name: fournos-namespace
      type: string
    - name: kubeconfig-secret
      type: string
  steps:
    - name: run-forge
      image: busybox:1.36
      env:
        - name: MOCK_SLEEP
          valueFrom:
            configMapKeyRef:
              name: fournos-mock-config
              key: sleep
              optional: true
      volumeMounts:
        - name: vault-secrets
          mountPath: /var/run/secrets/fournos
          readOnly: true
      script: |
        #!/bin/sh
        MOCK_SLEEP="${MOCK_SLEEP:-3}"
        echo "[mock-run] fjob-name=$(params.fjob-name)"
        echo "[mock-run] fournos-namespace=$(params.fournos-namespace)"
        echo "[mock-run] vault-secrets:"
        find /var/run/secrets/fournos -type f 2>/dev/null | sort | while read f; do echo "  $f ($(wc -c < "$f") bytes)"; done
        echo "[mock-run] simulating workload (${MOCK_SLEEP}s)..."
        sleep "$MOCK_SLEEP"
        echo "[mock-run] done"

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-cleanup
spec:
  params:
    - name: kubeconfig-secret
      type: string
  steps:
    - name: cleanup
      image: busybox:1.36
      script: |
        #!/bin/sh
        echo "[mock-cleanup] nothing to clean up in mock mode"

---
# Mock run-only Pipeline.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: fournos-run-only
spec:
  params:
    - name: fjob-name
      type: string
    - name: fournos-namespace
      type: string
    - name: kubeconfig-secret
      type: string
  tasks:
    - name: run
      taskRef:
        name: fournos-run
      params:
        - name: fjob-name
          value: "$(params.fjob-name)"
        - name: fournos-namespace
          value: "$(params.fournos-namespace)"
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"

---
# Mock config — controls mock task behavior.
# Override "sleep" to keep pipelines alive longer for exclusive-locking tests.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fournos-mock-config
data:
  sleep: "3"

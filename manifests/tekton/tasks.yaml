apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-prepare
  namespace: psap-automation
spec:
  params:
    - name: kubeconfig-secret
      type: string
    - name: job-name
      type: string
  steps:
    - name: validate
      image: quay.io/psap/remote-job-launcher:latest
      env:
        - name: KUBECONFIG
          value: /workspace/kubeconfig/kubeconfig
      volumeMounts:
        - name: kubeconfig
          mountPath: /workspace/kubeconfig
          readOnly: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        echo "Validating connectivity to target cluster…"
        kubectl cluster-info
        echo "Target cluster is reachable."
  volumes:
    - name: kubeconfig
      secret:
        secretName: $(params.kubeconfig-secret)

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-run
  namespace: psap-automation
spec:
  params:
    - name: forge-project
      type: string
    - name: forge-preset
      type: string
    - name: forge-args
      type: array
    - name: kubeconfig-secret
      type: string
    - name: gpu-count
      type: string
    - name: job-name
      type: string
    - name: secrets
      type: array
  steps:
    - name: run-forge
      image: quay.io/psap/remote-job-launcher:latest
      env:
        - name: KUBECONFIG
          value: /workspace/kubeconfig/kubeconfig
      volumeMounts:
        - name: kubeconfig
          mountPath: /workspace/kubeconfig
          readOnly: true
      args:
        - "$(params.forge-args[*])"
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        echo "Launching FORGE on target cluster…"
        forge run "$(params.forge-project)" \
          --preset "$(params.forge-preset)" \
          --gpu-count "$(params.gpu-count)" \
          --job-name "$(params.job-name)" \
          "$@"
  volumes:
    - name: kubeconfig
      secret:
        secretName: $(params.kubeconfig-secret)

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-cleanup
  namespace: psap-automation
spec:
  params:
    - name: kubeconfig-secret
      type: string
    - name: job-name
      type: string
  steps:
    - name: cleanup
      image: quay.io/psap/remote-job-launcher:latest
      env:
        - name: KUBECONFIG
          value: /workspace/kubeconfig/kubeconfig
      volumeMounts:
        - name: kubeconfig
          mountPath: /workspace/kubeconfig
          readOnly: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        echo "Cleaning up resources on target cluster…"
        kubectl delete job "$(params.job-name)" --ignore-not-found=true
        echo "Cleanup complete."
  volumes:
    - name: kubeconfig
      secret:
        secretName: $(params.kubeconfig-secret)

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-notify
  namespace: psap-automation
spec:
  params:
    - name: job-id
      type: string
  steps:
    - name: notify
      image: curlimages/curl:8.12.1
      script: |
        #!/bin/sh
        set -eu
        echo "Notifying Fournos that job $(params.job-id) is complete…"
        curl -sf -X POST \
          --max-time 10 \
          --retry 5 \
          --retry-delay 3 \
          --retry-connrefused \
          "http://fournos.psap-automation.svc:8000/api/v1/job/$(params.job-id)/complete"
        echo "Fournos notified."

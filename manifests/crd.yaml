apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fournosjobs.fournos.dev
spec:
  group: fournos.dev
  names:
    kind: FournosJob
    listKind: FournosJobList
    plural: fournosjobs
    singular: fournosjob
    shortNames:
      - fj
      - fjob
      - fjobs
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Owner
          type: string
          jsonPath: .spec.owner
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
          priority: 1
        - name: Exclusive
          type: boolean
          jsonPath: .spec.exclusive
          priority: 1
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Cluster
          type: string
          jsonPath: .status.cluster
        - name: Message
          type: string
          jsonPath: .status.message
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - forge
              properties:
                owner:
                  type: string
                  description: Team or individual that owns this job.
                displayName:
                  type: string
                  description: >-
                    Human-readable job name for external correlation.
                    Falls back to metadata.name if not set. Does not need to be unique.
                pipeline:
                  type: string
                  default: "fournos-full"
                cluster:
                  type: string
                hardware:
                  type: object
                  required:
                    - gpuType
                    - gpuCount
                  properties:
                    gpuType:
                      type: string
                      pattern: "^[a-z0-9]+$"
                      description: >-
                        Short GPU model name (e.g. "a100", "h200").
                        The operator prepends the resource prefix automatically.
                        Must be lowercase alphanumeric — no slashes or vendor prefixes.
                    gpuCount:
                      type: integer
                      minimum: 1
                forge:
                  type: object
                  required:
                    - project
                    - args
                  properties:
                    project:
                      type: string
                    args:
                      type: array
                      items:
                        type: string
                    configOverrides:
                      type: object
                      description: Overrides passed to the test framework as YAML.
                      x-kubernetes-preserve-unknown-fields: true
                secretRefs:
                  type: array
                  description: >-
                    Vault entry names (without the vault- prefix) to mount
                    into the pipeline.  The operator prepends vault- to
                    look up the corresponding K8s Secret (which must carry
                    the fournos.dev/vault-entry=true label) in the secrets
                    namespace.  Populated by Forge during the Resolving
                    phase when not provided by the user.
                  items:
                    type: string
                    pattern: "^[a-z0-9]([a-z0-9\\-]{0,61}[a-z0-9])?$"
                env:
                  type: object
                  description: Environment variables used to identify the test run.
                  additionalProperties:
                    type: string
                exclusive:
                  type: boolean
                  default: true
                  description: >-
                    Lock the target cluster for exclusive use by this job.
                    When true, the job waits until the cluster has no other active
                    jobs and then prevents any new job from being scheduled there.
                    Requires 'cluster' to be set.  Hardware is optional — when
                    omitted the Workload only requests cluster-slot resources
                    for locking.
                priority:
                  type: string
                shutdown:
                  type: string
                  enum:
                    - Stop
                    - Terminate
                  description: >-
                    Shutdown action to apply to the job. "Stop" cancels the
                    PipelineRun gracefully (CancelledRunFinally — runs finally
                    tasks). "Terminate" cancels immediately (Cancelled — skips
                    finally tasks). Both wait for the PipelineRun to finish
                    before releasing Kueue quota.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Resolving
                    - Pending
                    - Admitted
                    - Running
                    - Succeeded
                    - Failed
                    - Stopping
                    - Stopped
                cluster:
                  type: string
                pipelineRun:
                  type: string
                dashboardURL:
                  type: string
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string

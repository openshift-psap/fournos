# Full three-step pipeline: prepare → run → cleanup (finally).
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: fournos-full
spec:
  params:
    - name: fjob-name
      type: string
    - name: fournos-namespace
      type: string
    - name: kubeconfig-secret
      type: string
  tasks:
    - name: prepare
      taskRef:
        name: fournos-prepare
      params:
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"
    - name: run
      runAfter: [prepare]
      taskRef:
        name: fournos-run
      params:
        - name: fjob-name
          value: "$(params.fjob-name)"
        - name: fournos-namespace
          value: "$(params.fournos-namespace)"
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"
  finally:
    - name: cleanup
      taskRef:
        name: fournos-cleanup
      params:
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"

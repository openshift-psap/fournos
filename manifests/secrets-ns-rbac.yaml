# RBAC for reading secrets from a dedicated secrets namespace.
#
# Apply once per operator namespace:
#   cat manifests/secrets-ns-rbac.yaml \
#     | NAMESPACE=<operator-ns> SECRETS_NAMESPACE=<secrets-ns> envsubst \
#     | kubectl apply -f-
#
# The resource names include ${NAMESPACE} so multiple operator instances
# can coexist in the same secrets namespace without collisions.

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fournos-secrets-reader-${NAMESPACE}
  namespace: ${SECRETS_NAMESPACE}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fournos-secrets-reader-${NAMESPACE}
  namespace: ${SECRETS_NAMESPACE}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fournos-secrets-reader-${NAMESPACE}
subjects:
  - kind: ServiceAccount
    name: fournos
    namespace: ${NAMESPACE}

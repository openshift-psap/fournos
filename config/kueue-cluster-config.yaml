# ResourceFlavors — one per target cluster.
# nodeLabels let Kueue pin a Workload to a specific cluster when the
# Workload's podSet template carries a matching nodeSelector.

apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: cluster-1
spec:
  nodeLabels:
    fournos.dev/cluster: cluster-1

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: cluster-2
spec:
  nodeLabels:
    fournos.dev/cluster: cluster-2

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: cluster-3
spec:
  nodeLabels:
    fournos.dev/cluster: cluster-3

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: cluster-4
spec:
  nodeLabels:
    fournos.dev/cluster: cluster-4

---
# ClusterQueue — per-cluster GPU quotas.

apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: fournos-queue
spec:
  namespaceSelector:
    matchLabels:
      fournos.dev/queue-access: "true"
  preemption:
    withinClusterQueue: LowerPriority
    reclaimWithinCohort: Any
  resourceGroups:
    - coveredResources: ["fournos/gpu-a100", "fournos/gpu-h200", "fournos/cluster-slot"]
      flavors:
        - name: cluster-1
          resources:
            - name: "fournos/gpu-a100"
              nominalQuota: 8
            - name: "fournos/gpu-h200"
              nominalQuota: 0
            - name: "fournos/cluster-slot"
              nominalQuota: 100
        - name: cluster-2
          resources:
            - name: "fournos/gpu-a100"
              nominalQuota: 8
            - name: "fournos/gpu-h200"
              nominalQuota: 0
            - name: "fournos/cluster-slot"
              nominalQuota: 100
        - name: cluster-3
          resources:
            - name: "fournos/gpu-a100"
              nominalQuota: 0
            - name: "fournos/gpu-h200"
              nominalQuota: 8
            - name: "fournos/cluster-slot"
              nominalQuota: 100
        - name: cluster-4
          resources:
            - name: "fournos/gpu-a100"
              nominalQuota: 0
            - name: "fournos/gpu-h200"
              nominalQuota: 8
            - name: "fournos/cluster-slot"
              nominalQuota: 100

---

# WorkloadPriorityClasses — higher value = higher priority.

apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: manual
value: 200
description: "Manual user-triggered runs (highest priority)"

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: nightly
value: 100
description: "Nightly benchmark runs"

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: presubmit
value: 50
description: "PR presubmit runs (CI triggers)"

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: adhoc
value: 10
description: "Ad-hoc / low-priority runs"

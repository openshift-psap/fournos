# Full three-step pipeline: pre_cleanup -> prepare → test → post-cleanup.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: forge-full
spec:
  params:
    - name: job-name
      type: string
    - name: forge-project
      type: string
    - name: forge-config
      type: string
    - name: env
      type: string
      default: ""
    - name: kubeconfig-secret
      type: string
    - name: gpu-count
      type: string
    - name: secret-refs
      type: array
      default: []

  tasks:
    - name: pre-cleanup
      taskRef:
        name: forge-step
      params:
        # -- common params -- #
        - name: forge-project
          value: "$(params.forge-project)"
        - name: forge-config
          value: "$(params.forge-config)"
        - name: env
          value: "$(params.env)"
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"
        - name: gpu-count
          value: "$(params.gpu-count)"
        - name: job-name
          value: "$(params.job-name)"
        - name: secret-refs
          value:
          - $(params.secret-refs[*])
          # -- specific params -- #
        - name: job-step
          value: pre-cleanup

    - name: prepare
      taskRef:
        name: forge-step
      params:
        # -- common params -- #
        - name: forge-project
          value: "$(params.forge-project)"
        - name: forge-config
          value: "$(params.forge-config)"
        - name: env
          value: "$(params.env)"
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"
        - name: gpu-count
          value: "$(params.gpu-count)"
        - name: job-name
          value: "$(params.job-name)"
        - name: secret-refs
          value:
          - $(params.secret-refs[*])
          # -- specific params -- #
        - name: job-step
          value: prepare

    - name: test
      runAfter: [prepare]
      taskRef:
        name: forge-step
      params:
        # -- common params -- #
        - name: forge-project
          value: "$(params.forge-project)"
        - name: forge-config
          value: "$(params.forge-config)"
        - name: env
          value: "$(params.env)"
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"
        - name: gpu-count
          value: "$(params.gpu-count)"
        - name: job-name
          value: "$(params.job-name)"
        - name: secret-refs
          value:
          - $(params.secret-refs[*])
        # -- specific params -- #
        - name: job-step
          value: test

  finally:
    - name: post-cleanup
      taskRef:
        name: forge-step
      params:
        # -- common params -- #
        - name: forge-project
          value: "$(params.forge-project)"
        - name: forge-config
          value: "$(params.forge-config)"
        - name: env
          value: "$(params.env)"
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"
        - name: gpu-count
          value: "$(params.gpu-count)"
        - name: job-name
          value: "$(params.job-name)"
        - name: secret-refs
          value:
          - $(params.secret-refs[*])
        # -- specific params -- #
        - name: job-step
          value: pre-cleanup # there's currently no post-cleanup step

# Full three-step pipeline: prepare → run → cleanup (finally).
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: fournos-full
  annotations:
    fournos.dev/resolve-image: fournos-mock-resolve:dev
spec:
  workspaces:
    - name: artifacts
  params:
    - name: fjob-name
      type: string
    - name: fournos-workload-namespace
      type: string
    - name: kubeconfig-secret
      type: string
  tasks:
    - name: prepare
      taskRef:
        name: fournos-prepare
      workspaces:
        - name: artifacts
          workspace: artifacts
      params:
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"
    - name: run
      runAfter: [prepare]
      taskRef:
        name: fournos-run
      workspaces:
        - name: artifacts
          workspace: artifacts
      params:
        - name: fjob-name
          value: "$(params.fjob-name)"
        - name: fournos-workload-namespace
          value: "$(params.fournos-workload-namespace)"
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"
  finally:
    - name: cleanup
      taskRef:
        name: fournos-cleanup
      workspaces:
        - name: artifacts
          workspace: artifacts
      params:
        - name: kubeconfig-secret
          value: "$(params.kubeconfig-secret)"

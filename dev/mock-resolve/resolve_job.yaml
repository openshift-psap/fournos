# Minimal Job template for local dev / CI with the mock-resolve image.
#
# Unlike the production template (config/forge/resolve_job.yaml)
# this does NOT override command/args, so the image's own ENTRYPOINT runs.
# The operator still injects metadata, image, env-var values, ownerReferences,
# and deadline at runtime.
apiVersion: batch/v1
kind: Job
spec:
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: fournos
      restartPolicy: Never
      containers:
        - name: resolve
          imagePullPolicy: IfNotPresent
          env:
            - name: FJOB_NAME
            - name: FOURNOS_WORKLOAD_NAMESPACE

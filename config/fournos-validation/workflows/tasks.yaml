apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fournos-validate
spec:
  params:
    - name: kubeconfig-secret
      type: string
      default: "fournos-clusterless-placeholder"
  steps:
    - name: check-connectivity
      image: bitnami/kubectl:latest
      env:
        - name: KUBECONFIG
          value: /var/run/secrets/fournos-kubeconfig/kubeconfig
      volumeMounts:
        - name: kubeconfig
          mountPath: /var/run/secrets/fournos-kubeconfig
          readOnly: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        if [[ "$(params.kubeconfig-secret)" == "fournos-clusterless-placeholder" ]]; then
          echo "Running in clusterless mode - skipping cluster connectivity validation"
          exit 0
        fi

        echo "Validating connectivity to target cluster…"
        kubectl cluster-info
        echo "Target cluster is reachable."
  volumes:
    - name: kubeconfig
      secret:
        secretName: $(params.kubeconfig-secret)
        optional: true
